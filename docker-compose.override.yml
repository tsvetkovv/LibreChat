version: "3.8"
services:
  client:
    ports:
      - "18080:80"
      - "18443:443"
    networks:
      - librechat_isolated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    ports: []  # Remove any exposed ports
    networks:
      - librechat_isolated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    ports: []  # Remove any exposed ports
    networks:
      - librechat_isolated

  meilisearch:
    ports: []  # Remove any exposed ports
    networks:
      - librechat_isolated

  vectordb:
    ports: []  # Remove any exposed ports
    networks:
      - librechat_isolated

  rag_api:
    ports: []  # Remove any exposed ports
    networks:
      - librechat_isolated

networks:
  librechat_isolated:
    name: librechat_isolated
    driver: bridge